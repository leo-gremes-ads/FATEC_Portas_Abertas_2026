<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo</title>
</head>
<body>
    <div id="mensagem" style="display:none">
        "{{ mensagem }}"
    </div>
    <button id="botaozinho" onClick="reagirClique()">Exibir Mensagem</button>

    <script>
        let confirmado = false

        function reagirClique() {
            const botao = document.getElementById("botaozinho");
            const msg = document.getElementById("mensagem");

            if (!confirmado) {
                msg.style.display = "block";
                botao.innerText = "Sair";
                confirmado = true;
            } else {
                window.location.href = "{{ url_for('home') }}";
            }
        }
    </script>
</body>
</html>
